name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Soft runtime dep for local media (resize/vframes/combine/… fallback path).
      # Pure-JS paths run without it; installing here exercises the full suite.
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      # offline unit tests only — zero npm deps; the mock harness provides every
      # endpoint. NEVER add live NanoGPT calls here.
      - run: npm test
